<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="1040" viewBox="0 0 1450 1040" font-family="Helvetica, Arial, sans-serif">
  <rect width="1450" height="1040" fill="#fafaf8"/>

  <!-- ═══════════ Header ═══════════ -->
  <text x="40" y="48" font-size="22" font-weight="bold" fill="#2a2a2a">ingest — design decisions</text>
  <text x="40" y="72" font-size="13" fill="#777">claude-materia skill · journal + sources → labeled atomic notes · 2026-07-05 · topics 1–6 + deterministic-shell amendment</text>

  <!-- ═══════════ LEFT: The Vault ═══════════ -->
  <rect x="40" y="100" width="300" height="560" rx="8" fill="#f5f0e8" stroke="#b8a888" stroke-width="1.5"/>
  <text x="60" y="130" font-size="15" font-weight="bold" fill="#6b5a3e">VAULT SURFACES TOUCHED</text>

  <rect x="60" y="150" width="260" height="72" rx="5" fill="#fffdf8" stroke="#c9baa0"/>
  <text x="72" y="171" font-size="12" font-weight="bold" fill="#444">journal/YYYY-MM-DD.md</text>
  <text x="72" y="187" font-size="11" fill="#666">THE source · strict filename gate</text>
  <text x="72" y="201" font-size="11" fill="#666">ingested: true = per-file commit point</text>
  <text x="72" y="215" font-size="11" fill="#666">35 squatters: ignored, flagged by status</text>

  <rect x="60" y="236" width="260" height="64" rx="5" fill="#fffdf8" stroke="#c9baa0"/>
  <text x="72" y="257" font-size="12" font-weight="bold" fill="#444">notes/</text>
  <text x="72" y="273" font-size="11" fill="#666">filing target · verbatim bodies</text>
  <text x="72" y="287" font-size="11" fill="#666">writes title/labels/created/captured/source</text>

  <rect x="60" y="314" width="260" height="64" rx="5" fill="#fffdf8" stroke="#c9baa0"/>
  <text x="72" y="335" font-size="12" font-weight="bold" fill="#444">_machine/labels.yml</text>
  <text x="72" y="351" font-size="11" fill="#666">READ-ONLY — vocabulary frozen;</text>
  <text x="72" y="365" font-size="11" fill="#666">no fit → needs-label (journal only)</text>

  <rect x="60" y="392" width="260" height="64" rx="5" fill="#fffdf8" stroke="#c9baa0"/>
  <text x="72" y="413" font-size="12" font-weight="bold" fill="#444">_machine/ingest_paths.yml</text>
  <text x="72" y="429" font-size="11" fill="#666">source registry (add-source writes entries;</text>
  <text x="72" y="443" font-size="11" fill="#666">ingest writes last_read on vcs only)</text>

  <rect x="60" y="470" width="260" height="64" rx="5" fill="#fff8ef" stroke="#c98f41" stroke-width="1.5"/>
  <text x="72" y="491" font-size="12" font-weight="bold" fill="#8a5a1a">_machine/logs/ingest/&lt;run&gt;/</text>
  <text x="72" y="507" font-size="11" fill="#8a5a1a">NEW · proposals scratch (crash-safe) ·</text>
  <text x="72" y="521" font-size="11" fill="#8a5a1a">destructive-source archive (never rm)</text>

  <rect x="60" y="548" width="260" height="56" rx="5" fill="#fffdf8" stroke="#c9baa0"/>
  <text x="72" y="569" font-size="12" font-weight="bold" fill="#444">NO state file</text>
  <text x="72" y="585" font-size="11" fill="#666">idempotency = provenance + verbatim-body</text>
  <text x="72" y="599" font-size="11" fill="#666">match; rejections need no memory</text>

  <!-- Binding chain -->
  <rect x="40" y="690" width="300" height="120" rx="8" fill="#f4f4f6" stroke="#999" stroke-width="1.5"/>
  <text x="60" y="718" font-size="14" font-weight="bold" fill="#444">Per-install binding</text>
  <text x="60" y="742" font-size="11.5" fill="#555">SKILL.md (portable, no env paths)</text>
  <text x="60" y="760" font-size="11.5" fill="#555">→ ~/.claude/ingest.local.md</text>
  <text x="60" y="778" font-size="11.5" fill="#555">→ falls back to ~/.claude/vault.local.md</text>
  <text x="60" y="796" font-size="11.5" fill="#555">→ neither ⇒ fail loudly, never guess</text>

  <!-- Iron rule note -->
  <rect x="40" y="830" width="300" height="170" rx="8" fill="#f0ede8" stroke="#a89f90" stroke-width="1.5"/>
  <text x="60" y="858" font-size="14" font-weight="bold" fill="#544">Iron rule (fully binding here)</text>
  <text x="60" y="882" font-size="11.5" fill="#555">Extraction COPIES day-file lines verbatim —</text>
  <text x="60" y="898" font-size="11.5" fill="#555">never rewrites. Filing is scripted:</text>
  <text x="60" y="920" font-size="11.5" fill="#555">md5(body) verify · abort-on-mismatch ·</text>
  <text x="60" y="936" font-size="11.5" fill="#555">idempotent (source + body match skips).</text>
  <text x="60" y="958" font-size="11.5" fill="#555">Day-file is never modified beyond the</text>
  <text x="60" y="974" font-size="11.5" fill="#555">ingested marker (sanctioned duplication).</text>

  <!-- vault ↔ pipeline arrows -->
  <line x1="340" y1="260" x2="380" y2="260" stroke="#8a7a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="252" font-size="9" fill="#8a7a5a" text-anchor="middle">reads</text>
  <line x1="380" y1="520" x2="340" y2="520" stroke="#8a7a5a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="512" font-size="9" fill="#8a7a5a" text-anchor="middle">writes</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#8a7a5a"/>
    </marker>
  </defs>

  <!-- ═══════════ CENTER TOP: drain pipeline ═══════════ -->
  <rect x="380" y="100" width="600" height="560" rx="8" fill="#eef3fa" stroke="#7f9fc4" stroke-width="1.5"/>
  <text x="400" y="130" font-size="15" font-weight="bold" fill="#3a5a80">/ingest [source?] [--today]</text>
  <text x="400" y="146" font-size="11" fill="#5a7aa0">bare = full drain (journal first, then registered sources) · argument scopes</text>

  <rect x="410" y="158" width="540" height="56" rx="5" fill="#fdfeff" stroke="#a8c0d8"/>
  <text x="422" y="177" font-size="12" font-weight="bold" fill="#3a5a80">1 · resolve the window — scripts/journal-candidates + scripts/source-delta</text>
  <text x="422" y="192" font-size="11" fill="#556">closed day-files (date &lt; today, no marker) + per-source diff(last_read..HEAD)</text>
  <text x="422" y="206" font-size="11" fill="#556">--today widens: extract from the open day WITHOUT marking (idempotent re-runs)</text>

  <rect x="410" y="222" width="540" height="66" rx="5" fill="#fdfeff" stroke="#a8c0d8"/>
  <text x="422" y="241" font-size="12" font-weight="bold" fill="#3a5a80">2 · subagents split + label (the semantic core)</text>
  <text x="422" y="257" font-size="11" fill="#556">per source / day-file batch · split into atomic thoughts (sub-bullets stay with parent)</text>
  <text x="422" y="271" font-size="11" fill="#556">three-way: label match → extract · worthy-no-fit → needs-label (journal only) · else diary</text>
  <text x="422" y="284" font-size="11" fill="#556">active labels only · never mints · split-siblings share captured + Tier-1 related links</text>

  <rect x="410" y="296" width="540" height="44" rx="5" fill="#fdfeff" stroke="#a8c0d8"/>
  <text x="422" y="315" font-size="12" font-weight="bold" fill="#3a5a80">3 · proposals persist to _machine/logs/ingest/&lt;run&gt;/</text>
  <text x="422" y="331" font-size="11" fill="#556">crash mid-review loses nothing (lesson #8 — never /tmp)</text>

  <rect x="410" y="352" width="540" height="66" rx="5" fill="#fdf3dd" stroke="#d9a441" stroke-width="1.5"/>
  <text x="422" y="371" font-size="12" font-weight="bold" fill="#8a5a1a">4 · ONE batch confirm gate — interactive v1, headless deferred</text>
  <text x="422" y="387" font-size="11" fill="#8a5a1a">grouped by day-file/source: title + labels + disposition + verbatim body as evidence</text>
  <text x="422" y="401" font-size="11" fill="#8a5a1a">approve-all-with-exceptions · relabel / re-split / demote-to-diary · conversational fixes</text>
  <text x="422" y="414" font-size="11" fill="#8a5a1a">rejected split = stays diary narrative; no rejection memory needed</text>

  <rect x="410" y="430" width="540" height="66" rx="5" fill="#fdfeff" stroke="#a8c0d8"/>
  <text x="422" y="449" font-size="12" font-weight="bold" fill="#3a5a80">5 · scripts/file-notes — the serial filer (deterministic shell)</text>
  <text x="422" y="465" font-size="11" fill="#556">cross-proposal dedup → idempotent writes (source + body match) → md5 verify,</text>
  <text x="422" y="479" font-size="11" fill="#556">abort-on-mismatch → ONLY THEN commit points, in order:</text>
  <text x="422" y="492" font-size="11" fill="#556">ingested markers · last_read advances · destructive staging moves</text>

  <rect x="410" y="508" width="540" height="44" rx="5" fill="#fdfeff" stroke="#a8c0d8"/>
  <text x="422" y="527" font-size="12" font-weight="bold" fill="#3a5a80">6 · run log records jj change-id at drain start</text>
  <text x="422" y="543" font-size="11" fill="#556">whole-run undo stays a one-liner · no explicit pre-commit needed (jj auto-snapshots)</text>

  <rect x="410" y="564" width="540" height="76" rx="5" fill="#edf5ee" stroke="#85ab8a" stroke-width="1.5"/>
  <text x="422" y="583" font-size="12" font-weight="bold" fill="#3a6a44">/ingest status — read-only health (principle 7: surface, never nag)</text>
  <text x="422" y="599" font-size="11" fill="#556">pending day-files · per-source delta · needs-label backlog size ·</text>
  <text x="422" y="613" font-size="11" fill="#556">marked-then-modified day-files (late phone-sync detection net) ·</text>
  <text x="422" y="627" font-size="11" fill="#556">journal squatters ("35 non-day-file notes — relocate to notes/?")</text>

  <!-- ═══════════ CENTER BOTTOM: source modes ═══════════ -->
  <rect x="380" y="690" width="600" height="310" rx="8" fill="#edf5ee" stroke="#85ab8a" stroke-width="1.5"/>
  <text x="400" y="720" font-size="15" font-weight="bold" fill="#3a6a44">Registered sources (ingest_paths) — two tracking modes</text>
  <text x="400" y="736" font-size="11" fill="#5a8a60">consume the delta; the source's tracking model defines the delta · lens = FILTER, not classifier</text>

  <rect x="410" y="750" width="540" height="70" rx="5" fill="#fdfffd" stroke="#a0c4a6"/>
  <text x="422" y="769" font-size="12" font-weight="bold" fill="#3a6a44">track: vcs — live repos, kept intact</text>
  <text x="422" y="785" font-size="11" fill="#556">read committed state on registered branch · extract from changed hunks only</text>
  <text x="422" y="799" font-size="11" fill="#556">(whole file read for awareness) · last_read → HEAD after that source's notes file</text>
  <text x="422" y="813" font-size="11" fill="#556">provenance: source: &lt;remote&gt; &lt;path&gt; @&lt;commit&gt;</text>

  <rect x="410" y="834" width="540" height="70" rx="5" fill="#fdfffd" stroke="#a0c4a6"/>
  <text x="422" y="853" font-size="12" font-weight="bold" fill="#3a6a44">track: destructive — staging dirs, drained</text>
  <text x="422" y="869" font-size="11" fill="#556">consume current contents · ARCHIVE-NOT-DELETE: consumed files move to</text>
  <text x="422" y="883" font-size="11" fill="#556">_machine/logs/ingest/&lt;date&gt;/ (rm would destroy out-of-lens content) ·</text>
  <text x="422" y="897" font-size="11" fill="#556">residue in staging = by definition unprocessed; no stored state</text>

  <rect x="410" y="918" width="540" height="70" rx="5" fill="#fdfffd" stroke="#a0c4a6"/>
  <text x="422" y="937" font-size="12" font-weight="bold" fill="#3a6a44">lens semantics — out-of-lens ≠ unfittable</text>
  <text x="422" y="953" font-size="11" fill="#556">extract ONLY thoughts matching lens labels (when_to_apply = extraction instruction)</text>
  <text x="422" y="967" font-size="11" fill="#556">needs-label is the JOURNAL's valve (unfiltered brain-stream); a lensed source's</text>
  <text x="422" y="981" font-size="11" fill="#556">non-matching content is out of scope, not parked — it stays in the source</text>

  <!-- ═══════════ RIGHT: decisions ═══════════ -->
  <rect x="1010" y="100" width="400" height="560" rx="8" fill="#f4f4f6" stroke="#999" stroke-width="1.5"/>
  <text x="1030" y="130" font-size="15" font-weight="bold" fill="#444">Decisions (topics 1–6 + amendment)</text>

  <text x="1030" y="160" font-size="12" font-weight="bold" fill="#444">1 · Home</text>
  <text x="1030" y="176" font-size="11.5" fill="#555">Portable claude-materia skill "ingest" — invariant logic, data-side</text>
  <text x="1030" y="191" font-size="11.5" fill="#555">content-dependence. Work-vault future demands portability.</text>

  <text x="1030" y="219" font-size="12" font-weight="bold" fill="#444">2 · Surface</text>
  <text x="1030" y="235" font-size="11.5" fill="#555">/ingest [source?] [--today] (bare = drain everything, journal first)</text>
  <text x="1030" y="250" font-size="11.5" fill="#555">+ /ingest status (read-only) · help via kernel convention.</text>

  <text x="1030" y="278" font-size="12" font-weight="bold" fill="#444">3 · Journal drain</text>
  <text x="1030" y="294" font-size="11.5" fill="#555">Strict YYYY-MM-DD gate; three-way label-driven extraction;</text>
  <text x="1030" y="309" font-size="11.5" fill="#555">--today = extract-without-marking; marker closed-days-only;</text>
  <text x="1030" y="324" font-size="11.5" fill="#555">squatters ignored + surfaced by status, relocated manually.</text>

  <text x="1030" y="352" font-size="12" font-weight="bold" fill="#444">4 · Sources drain</text>
  <text x="1030" y="368" font-size="11.5" fill="#555">Hunks-only vcs delta; lens = filter (needs-label journal-only);</text>
  <text x="1030" y="383" font-size="11.5" fill="#555">destructive = archive-not-delete; agent-per-source + serial filer.</text>

  <text x="1030" y="411" font-size="12" font-weight="bold" fill="#444">5 · Confirmation</text>
  <text x="1030" y="427" font-size="11.5" fill="#555">Interactive batch gate v1 (approve-all-with-exceptions). Headless</text>
  <text x="1030" y="442" font-size="11.5" fill="#555">deferred; trigger named: correction rate ≈ 0. needs-label freeze</text>
  <text x="1030" y="457" font-size="11.5" fill="#555">already makes headless additive later — no redesign.</text>

  <text x="1030" y="485" font-size="12" font-weight="bold" fill="#444">6 · Idempotency &amp; failure</text>
  <text x="1030" y="501" font-size="11.5" fill="#555">Filing idempotent by provenance + verbatim body; ordered commit</text>
  <text x="1030" y="516" font-size="11.5" fill="#555">points after verify; late phone-sync edits = detection net in</text>
  <text x="1030" y="531" font-size="11.5" fill="#555">status, not prevention machinery; proposals persist pre-gate.</text>

  <text x="1030" y="559" font-size="12" font-weight="bold" fill="#444">7 · Deterministic shell, semantic core</text>
  <text x="1030" y="575" font-size="11.5" fill="#555">Scripts own window/delta/dedup/verify/commit (journal-candidates,</text>
  <text x="1030" y="590" font-size="11.5" fill="#555">source-delta, file-notes, ingest-status) — env-agnostic, vault path</text>
  <text x="1030" y="605" font-size="11.5" fill="#555">as arg. Model owns split/label/title/gate. Mechanical work is</text>
  <text x="1030" y="620" font-size="11.5" fill="#555">never freehanded (the 412-truncation lesson, enforced in code).</text>

  <!-- ═══════════ RIGHT BOTTOM: cascades ═══════════ -->
  <rect x="1010" y="690" width="400" height="310" rx="8" fill="#faf0ee" stroke="#c48f85" stroke-width="1.5"/>
  <text x="1030" y="720" font-size="15" font-weight="bold" fill="#8a4a3e">Cascade edits (shipped with this skill)</text>

  <text x="1030" y="750" font-size="12" font-weight="bold" fill="#8a4a3e">vault/SKILL.md — Identity section</text>
  <text x="1030" y="766" font-size="11.5" fill="#666">Remove the LAST vault-local claim (ongoing-ingest classification)</text>
  <text x="1030" y="781" font-size="11.5" fill="#666">— joins the synthesizer under "portable consumers, live-read</text>
  <text x="1030" y="796" font-size="11.5" fill="#666">vocabulary." The vault-local category empties; question closed.</text>

  <text x="1030" y="826" font-size="12" font-weight="bold" fill="#8a4a3e">README + plugin.json</text>
  <text x="1030" y="842" font-size="11.5" fill="#666">Materia-table row · version 0.12.0 → 0.13.0</text>

  <text x="1030" y="872" font-size="12" font-weight="bold" fill="#8a4a3e">Live ~/Vault (runtime, at first use)</text>
  <text x="1030" y="888" font-size="11.5" fill="#666">_machine/logs/ingest/ created on first run · no INSTRUCTION.md</text>
  <text x="1030" y="903" font-size="11.5" fill="#666">edits needed (field ownership + source: format already updated</text>
  <text x="1030" y="918" font-size="11.5" fill="#666">by the synthesizer build's cascades)</text>

  <text x="1030" y="948" font-size="11" fill="#997" font-style="italic">Not touched: ~/.claude/plans/vault-design.md (parallel session) ·</text>
  <text x="1030" y="963" font-size="11" fill="#997" font-style="italic">labels.yml (read-only to ingest) · notes bodies (verbatim always) ·</text>
  <text x="1030" y="978" font-size="11" fill="#997" font-style="italic">build session: design+spec+plan HERE, execution in a fresh session</text>
</svg>
